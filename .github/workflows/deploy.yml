name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: 'pages'
  cancel-in-progress: true

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4

      - name: Prepare deployment
        run: |
          set -euo pipefail
          mkdir -p ./_site

          if [ -d docs ]; then
            cp -r docs/. ./_site/
          fi

          if [ -d workshop/pt_BR ]; then
            mkdir -p ./_site/workshop/pt_BR
            cp -r workshop/pt_BR/. ./_site/workshop/pt_BR/
          fi
          if [ -d workshop/es ]; then
            mkdir -p ./_site/workshop/es
            cp -r workshop/es/. ./_site/workshop/es/
          fi

          touch ./_site/.nojekyll

      - uses: actions/configure-pages@v4

      - uses: actions/upload-pages-artifact@v3
        with:
          path: _site

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
